<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sad_pho — retro desk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="crt-overlay" aria-hidden="true"></div>

  <main class="scene" id="scene">
    <img
      class="hero-image"
      src="assets/images/hero-scene.jpg"
      alt="sad_pho at a retro PC with trackball mouse"
      width="1024"
      height="1024"
    >

    <div class="monitor-screen" id="monitorScreen">
      <div class="monitor-scanlines" aria-hidden="true"></div>
      <div class="desktop-icons">
        <a
          class="desktop-icon"
          href="https://www.imdb.com/name/nm3465606/"
          target="_blank"
          rel="noopener noreferrer"
          title="IMDB"
        >
          <img src="assets/images/icon-imdb.jpg" alt="" width="48" height="48">
          <span class="icon-label">IMDB</span>
        </a>

        <a
          class="desktop-icon"
          href="https://steamcommunity.com/id/mocherz/"
          target="_blank"
          rel="noopener noreferrer"
          title="Steam"
        >
          <img src="assets/images/icon-steam.jpg" alt="" width="48" height="48">
          <span class="icon-label">STEAM</span>
        </a>

        <button
          class="desktop-icon desktop-icon--btn"
          id="musicIconBtn"
          type="button"
          title="Music Player"
          aria-expanded="false"
          aria-controls="musicPlayer"
        >
          <img src="assets/images/icon-music.jpg" alt="" width="48" height="48">
          <span class="icon-label">MUSIC</span>
        </button>
      </div>
    </div>
  </main>

  <div class="music-player" id="musicPlayer" hidden>
    <div class="player-chrome">
      <div class="player-titlebar">
        <span class="player-title">♪ TRACKER.EXE</span>
        <button class="player-close" id="playerClose" type="button" aria-label="Close player">✕</button>
      </div>

      <div class="player-body">
        <div class="player-display">
          <div class="player-led" id="playerLed">▶ READY</div>
          <div class="player-track-name" id="trackName">select a track</div>
          <div class="player-meta">
            <span class="format-badge" id="formatBadge">---</span>
            <span id="trackPosition">00 / 00</span>
          </div>
        </div>

        <div class="player-visualizer" id="visualizer" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
        </div>

        <ul class="playlist" id="playlist"></ul>

        <div class="player-controls">
          <button class="ctrl-btn" id="btnPrev" type="button" title="Previous">⏮</button>
          <button class="ctrl-btn ctrl-btn--main" id="btnPlay" type="button" title="Play">▶</button>
          <button class="ctrl-btn" id="btnPause" type="button" title="Pause">⏸</button>
          <button class="ctrl-btn" id="btnStop" type="button" title="Stop">⏹</button>
          <button class="ctrl-btn" id="btnNext" type="button" title="Next">⏭</button>
        </div>

        <div class="player-progress">
          <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <p>sad_pho © 2026 · MOD · XM · MIDI · tracker vibes</p>
  </footer>

  <script>
    var Module = {
      locateFile: function (path) {
        if (path.indexOf('.mem') !== -1) {
          return 'https://cdn.jsdelivr.net/gh/deskjet/chiptune2.js@master/libopenmpt.js.mem';
        }
        return path;
      },
      onRuntimeInitialized: function () {
        if (window.SadPhoMusic) window.SadPhoMusic.init();
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/gh/deskjet/chiptune2.js@master/libopenmpt.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/deskjet/chiptune2.js@master/chiptune2.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tonejs/midi@2.0.28/build/Midi.js"></script>
  <script src="js/music-player.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
